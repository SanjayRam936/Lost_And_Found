name: Keep HF backend warm

# Pings the Hugging Face Space's health endpoint on a schedule so the free-tier
# container doesn't go to sleep (which makes the first request slow to wake).
# Also runnable manually from the Actions tab.

on:
  schedule:
    # Every 10 minutes. GitHub may delay scheduled runs under load — that's fine.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

# Never run two pings at once; a queued one can drop the older.
concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /api/v1/health/
        run: |
          URL="https://suyambu08-lost-and-found-ai.hf.space/api/v1/health/"
          # The first hit after a cold sleep can take ~30-60s to wake the Space,
          # so retry a few times with a generous timeout.
          for i in 1 2 3 4; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 70 "$URL" || echo "000")
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Backend is warm ✅"
              exit 0
            fi
            sleep 15
          done
          # Best-effort: don't fail the workflow just because a warm-up was slow.
          echo "::warning::Health check did not return 200 after retries (still attempted to warm)."
          exit 0
